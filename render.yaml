services:
  - type: web
    name: sia-database
    image:
      repo: render/postgres
      tag: "15"
    envVars:
      - key: POSTGRES_USER
        value: app
      - key: POSTGRES_PASSWORD
        sync: false
      - key: POSTGRES_DB
        value: appdb
    persistentDisk:
      name: postgres-data
      mountPath: /var/lib/postgresql/data
      sizeGB: 10
    region: oregon

  - type: web
    name: sia-backend
    repo: https://github.com/RAS06/study_in_sociable_service_agents.git
    branch: master
    dockerfile: ./backend/Dockerfile
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromService:
          name: sia-database
          type: postgres
          property: connectionString
      - key: MASTER_KEY
        sync: false
    ports:
      - port: 8000
    region: oregon
    depends_on:
      - sia-database

  - type: web
    name: sia-frontend
    repo: https://github.com/RAS06/study_in_sociable_service_agents.git
    branch: master
    dockerfile: ./frontend/Dockerfile
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          name: sia-backend
          type: web
          property: url
    ports:
      - port: 3000
    region: oregon
    depends_on:
      - sia-backend
