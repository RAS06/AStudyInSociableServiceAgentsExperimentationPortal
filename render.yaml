services:
  - type: pserv
    name: sia-database
    plan: starter
    envVars:
      - key: POSTGRES_USER
        value: app
      - key: POSTGRES_PASSWORD
        sync: false
      - key: POSTGRES_DB
        value: appdb

  - type: web
    name: sia-backend
    repo: https://github.com/RAS06/study_in_sociable_service_agents.git
    branch: master
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: sia-database
          property: connectionString
      - key: MASTER_KEY
        sync: false
    region: oregon

  - type: web
    name: sia-frontend
    repo: https://github.com/RAS06/study_in_sociable_service_agents.git
    branch: master
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          name: sia-backend
          type: web
          property: url
    region: oregon
